<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도형 서식 폼 만들기</title>
</head>
<body>
    <h3>도형 서식 폼 만들기</h3>
    <hr>
    <fieldset>
        <legend>도형 서식 입력</legend>
        선종류 : <input type="text" list="shape"><br>
        <datalist id="shape">
            <option value="선 없음"></option>
            <option value="실선"></option>
            <option value="점선"></option>
        </datalist>
        선두께 : <input type="number"> 선색 : <input type="color"><br><br>
        투명도(0 ~ 100) : <input type="range" min="0" max="100" list="range">
        <datalist id="range">
            <option value="10" label="Low"></option>
            <option value="50" label="Medium" selected></option>
            <option value="90" label="High"></option>
        </datalist>
    </fieldset>
</body>
</html>
