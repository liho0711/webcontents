<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>폼 스타일 주기</title>
        <style>
            input[type=text]{
                color: red;
            }input:hover, textarea:hover{
                background: aliceblue;
            }input[type=text]:focus, input[type=email]:focus{
                font-size: 120%;
            }label{
                display: block; padding: 10px;
            }label span{
                display: inline-block;
                width: 80px; padding: 10px;
                text-align: right;
            }
        </style>
    </head>
    <body>
        <h3>CONTACT US</h3>
        <hr>
        <form>
            <label>
                <span>Name</span><input type="text" placeholder="Elvis"><br>
            </label>
            <label>
                <span>Email</span><input type="email" placeholder="Elvis@graceland.com">
            </label>
            <label>
                <span>Comment</span><textarea placeholder="메세지를 남겨주세요"></textarea>
            </label>
            <label>
                <span>Name</span><input type="submit" value="submit">
            </label>
        </form>
    </body>
</html>
