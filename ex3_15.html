<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>시간 정보를 입력하는 폼 활용</title>
    </head>
    <body>
        <h3>시간 정보 입력 HTML5 폼 요소</h3>
        초기 세팅 : 2022년 4월 15일 낮 2시 40분(10초 32)
        시간을 변경해보세요
        <hr>
        <form>
            <pre>
                month : <input type="month" value="2026-04"><br>
                week : <input type="week" value="2026-W16"><br>
                date : <input type="date" value="2026-04-15"><br>
                time : <input type="time" value="14:40"><br>
                local : <input type="datetime-local" value="2026-04-15T14:40:10.32"><br>
            </pre>
        </form>
    </body>
</html>
