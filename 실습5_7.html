<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>animation</title>
    <style>
        img{
            transition: width 2s;
            width: 200px;
            height: 200px;
        }img:hover{
            width: 100%;
        }
    </style>
</head>
<body>
    <h3>스폰지밥</h3>
    <img src="https://e7.pngegg.com/pngimages/13/178/png-clipart-spongebob-squarepants-illustration-graphy-computer-icons-sponge-bob-cartoon-spongebob-squarepants.png">
</body>
</html>
