<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>색 이름과 코드</title>
        <style>
            thead{
                text-align: center;
            }.Brown{
                background-color: #A52A2A;
            }.DeepSkyBlue{
                background-color: #00BFFF;
            }.Blueviolet{
                background-color: #8A2BE2;
            }.Gold{
                background-color: #FFD700;
            }.DarkOrange{
                background-color: #FF8C00;
            }.OliveDrab{
                background-color: #6B8E23;
            }
        </style>
    </head>
    <body>
        <h3>색 이름과 코드</h3>
        <hr>
        <table border="1">
            <thead>
                <th>이름</th>
                <th>코드</th>
                <th style="width: 80px;">색</th>
                <th>이름</th>
                <th>코드</th>
                <th style="width: 80px;">색</th>
            </thead>
            <tbody>
                <tr>
                    <td>Brown</td>
                    <td>#A52A2A</td>
                    <td class="Brown"></td>
                    <td>DeepSkyBlue</td>
                    <td>#00BFFF</td>
                    <td class="DeepSkyBlue"></td>
                </tr>
                <tr>
                    <td>Blueviolet</td>
                    <td>#8A2BE2</td>
                    <td class="Blueviolet"></td>
                    <td>Gold</td>
                    <td>#FFD700</td>
                    <td class="Gold"></td>
                </tr>
                <tr>
                    <td>DarkOrange</td>
                    <td>#FF8C00</td>
                    <td class="DarkOrange"></td>
                    <td>OliveDrab</td>
                    <td>#6B8E23</td>
                    <td class="OliveDrab"></td>
                </tr>
            </tbody>
        </table>
    </body>
</html>
