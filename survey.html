<!DOCTYPE html>
    <html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>설문지</title>
    </head>
    <body>
        <h2>설문지</h2>
        <p>어떤 느낌을 받았는지, 혹시 친해지고 싶어졌다면 참여 부탁드립니다.</p>
        <hr>
        학년 : <input type="radio" name="grade" value="1">1학년 <input type="radio" name="grade" value="2">2학년 <input type="radio" name="grade" value="3">3학년<br>
        성별 : <input type="radio" name="sexual" value="m">남 <input type="radio" name="sexual" value="f">여<br>
        알게된 계기 : <input type="text" list="how"><br>
        <datalist id="how">
            <option value="친구 소개"></option>
            <option value="인터넷 등 매체"></option>
            <option value="과제를 통해"></option>
        </datalist>
        남기고 싶은 말 : <textarea cols="20" rows="5">이곳에 작성해주세요.</textarea>
    </body>
</html>
